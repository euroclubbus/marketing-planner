name: Update Events Calendar

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate events.json
        run: node parser/generate-events.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add parser/output/events.json
          git diff --staged --quiet || git commit -m "chore: update events calendar $(date -u +%Y-%m-%d)"
          git push
